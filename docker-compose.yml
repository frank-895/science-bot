services:
  runner:
    build:
      context: .
      dockerfile: executor/Dockerfile
    restart: unless-stopped
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=1g
    volumes:
      - ${SCIENCE_BOT_EXECUTOR_RUNS_ROOT:-.science-bot/runs}:/runs
      - ${SCIENCE_BOT_EXECUTOR_CAPSULES_ROOT:-.science-bot/extracted_capsules}:/capsules:ro
    mem_limit: 2g
    cpus: 1.0
    pids_limit: 256
